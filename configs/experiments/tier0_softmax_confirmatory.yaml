# 1,000 independent systems per cell; intended for the preregistered Tier-0 run.
analytic:
  input_dims: [2, 4, 8, 16]
  class_counts: [3, 5, 10]
  query_counts: [2, 4, 8, 16, 32, 64]
  query_strategies: [gaussian, basis]
  observation_channels: [probabilities, samples]
  sample_counts: [1, 8, 32, 128, 512]
  systems_per_cell: 1000
  holdout_queries: 1024
  weight_scale: 1.0
  query_scale: 1.0
  dirichlet_smoothing: 0.5
  ridge: 0.0
  seed: 20260621
