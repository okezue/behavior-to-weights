model:
  vocab_size: 16
  max_seq_len: 8
  observation_dim: 16
  trace_width: 16
  trace_heads: 2
  query_layers: 1
  set_layers: 1
  latent_dim: 16
  address_width: 8
  decoder_width: 16
  decoder_layers: 1
  max_tensors: 64
  max_layers: 8
  role_count: 32
  dropout: 0.0

training:
