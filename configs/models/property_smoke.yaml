    - architecture_id
    - task_id
    - intervention_kind
    - training_step_bin
    - factor:optimizer
  steps: 20
  batch_size: 4
  query_budgets: [8, 16]
  learning_rate: 0.001
  weight_decay: 0.0001
  warmup_steps: 2
  validation_every: 5
  validation_batches: 2
  early_stopping_patience: 10
  seed: 20260621
  device: cpu
