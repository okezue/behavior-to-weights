name: tier2-text-pilot
dataset_directory: data/hf/tinystories-clean-bpe2048
zoo:
  architectures:
    - {vocab_size: 2048, max_seq_len: 256, d_model: 96,  n_heads: 4,  n_layers: 4,  d_ff: 384,  dropout: 0.0}
    - {vocab_size: 2048, max_seq_len: 256, d_model: 160, n_heads: 5,  n_layers: 6,  d_ff: 640,  dropout: 0.0}
    - {vocab_size: 2048, max_seq_len: 256, d_model: 256, n_heads: 8,  n_layers: 8,  d_ff: 1024, dropout: 0.0}
    - {vocab_size: 2048, max_seq_len: 256, d_model: 384, n_heads: 12, n_layers: 12, d_ff: 1536, dropout: 0.0}
  model_seeds: [100, 101, 102, 103]
  data_order_seeds: [201, 401]
  optimizers:
    - {name: adamw, learning_rate: 0.0003, weight_decay: 0.1, beta1: 0.9, beta2: 0.95}
  train_steps: 20000
  checkpoint_steps: [0, 1000, 5000, 20000]
  batch_size: 64
  validation_batches: 32
  gradient_clip: 1.0
  interventions:
    - {kind: attention_head_ablation, count: 1}
    - {kind: lora_edit, count: 1, rank: 8, scale: 0.02}
split_policy:
  train_fraction: 0.70
  validation_fraction: 0.10
  test_fraction: 0.20
  salt: b2w-tier2-text-pilot-v1
