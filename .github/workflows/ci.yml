name: ci
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install --upgrade pip
      - run: pip install -e '.[dev]'
      - run: ruff check src tests scripts infra/aws
      - run: mypy src/behavior2weights
      - run: pytest
        env:
          OMP_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
      - run: b2w doctor

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e '.[dev]'
      - run: b2w smoke --output artifacts/ci-smoke --overwrite
        env:
          OMP_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
      - uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: artifacts/ci-smoke/smoke_report.json
